[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hpc-prefect-adapters"
version = "0.1.0"
description = "HPC adapters (Miyabi, Fugaku, Slurm) for HPC Prefect workflows"
requires-python = ">=3.10"
dependencies = [
    "hpc-prefect-core",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
"hpc_prefect_adapters" = ["**/*.j2"]

