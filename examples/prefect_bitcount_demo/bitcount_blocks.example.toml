# Required for both targets
hpc_target = "miyabi" # "miyabi" or "fugaku"
# Miyabi uses project. Fugaku also accepts legacy project, but tutorials prefer `group = "ra000000"`.
project = "gz00"
# group = "ra000000"
queue = "regular-c" # Miyabi queue, or Fugaku rscgrp (e.g. "small")
work_dir = "/work/${GROUP:gz00}/${USER}/miyabi_tutorial"

# Everything below is optional.
# If omitted, create_blocks.py uses built-in defaults.
# launcher = "mpiexec.hydra"  # Miyabi default; Fugaku default is "mpiexec"
# walltime = "00:15:00"
# num_nodes = 2
# mpiprocs = 5
# ompthreads = 1
# shots = 100000
# modules = ["intel/2023.2.0", "impi/2021.10.0"]  # Miyabi-oriented defaults
# mpi_options = []

# Optional Fugaku-specific settings (used only when hpc_target = "fugaku")
# fugaku_gfscache = "/vol0002"
# fugaku_spack_modules = ["fj", "fjmpi"]
# fugaku_mpi_options_for_pjm = ["max-proc-per-node=4"]

# Optional executable override
# optimized_executable = "/work/gz00/<user>/miyabi_tutorial/get_counts_hist"
# optimized_executable = "/vol0001/home/<user>/prefect_bitcount_demo/bin/get_counts_hist"

# Optional naming overrides
# command_block_name = "cmd-bitcount-hist"
# execution_profile_block_name = "exec-bitcount-mpi"       # Miyabi default name
# execution_profile_block_name = "exec-bitcount-fugaku"    # Fugaku suggested name
# hpc_profile_block_name = "hpc-miyabi-bitcount"           # Miyabi default name
# hpc_profile_block_name = "hpc-fugaku-bitcount"           # Fugaku suggested name
# options_variable_name = "miyabi-bitcount-options"        # Miyabi default name
# options_variable_name = "fugaku-bitcount-options"        # Fugaku suggested name

# Legacy tutorial-style settings (Miyabi only)
# bitcounter_block_name = "miyabi-tutorial"
# tutorial_variable_name = "miyabi-tutorial"
