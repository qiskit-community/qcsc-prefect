[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hpc-prefect-blocks"
version = "0.1.0"
description = "Prefect block definitions for HPC + Miyabi execution"
requires-python = ">=3.10"
dependencies = [
    "prefect>=2.19",
]

[tool.setuptools.packages.find]
where = ["src"]
