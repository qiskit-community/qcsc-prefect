# Example configuration for SBD Prefect blocks on Fugaku
# Copy this file to algorithms/sbd/sbd_blocks.toml and adjust the required paths/group.

# Required for Fugaku
hpc_target = "fugaku"
group = "ra000000"
queue = "small"
work_dir = "/vol0000/mdt6/data/ra000000/u12345/sbd_jobs"
sbd_executable = "/vol0000/mdt6/data/ra000000/u12345/qcsc-prefect/algorithms/sbd/native/diag"

# Tutorial baseline execution profile
launcher = "mpiexec"
walltime = "02:00:00"
num_nodes = 2
mpiprocs = 2
mpi_options = ["-n", "2"]

# Optional site-specific settings
fugaku_gfscache = "/vol0002"
# fugaku_spack_modules = ["fj", "fjmpi"]
# fugaku_mpi_options_for_pjm = ["max-proc-per-node=1"]
# modules = ["LLVM/llvmorg-21.1.0"]
# pre_commands = []

# Block / variable names
command_block_name = "cmd-sbd-diag"
execution_profile_block_name = "exec-sbd-fugaku"
hpc_profile_block_name = "hpc-fugaku-sbd"
solver_block_name = "davidson-solver"
options_variable_name = "sqd_options"

# Solver script / metrics naming
script_filename = "sbd_solver.pjm"
metrics_artifact_key = "fugaku-sbd-metrics"

# Optional solver parameters
task_comm_size = 1
adet_comm_size = 1
bdet_comm_size = 1
block = 4
iteration = 1
tolerance = 0.01
carryover_ratio = 0.1
solver_mode = "cpu"

# Optional runtime options variable
shots = 50000
