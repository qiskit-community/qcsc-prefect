# Required
project = "gz00"
queue = "regular-c"
work_dir = "/work/gz00/<user>/sbd_jobs"
sbd_executable = "/work/gz00/<user>/hpc-prefect/algorithms/sbd/native"

# Optional execution profile
launcher = "mpiexec.hydra"
walltime = "02:00:00"
num_nodes = 1
mpiprocs = 48
ompthreads = 1
modules = ["intel/2023.2.0", "impi/2021.10.0"]
mpi_options = ["-np", "48"]

# Optional block/variable names
command_block_name = "cmd-sbd-diag"
execution_profile_block_name = "exec-sbd-mpi"
hpc_profile_block_name = "hpc-miyabi-sbd"
solver_block_name = "davidson-solver"
options_variable_name = "sqd_options"

# Optional solver parameters
task_comm_size = 1
adet_comm_size = 1
bdet_comm_size = 1
block = 10
iteration = 2
tolerance = 0.0001
carryover_ratio = 0.5
solver_mode = "cpu"

# Optional runtime options variable (default if omitted: {"params":{"shots":500000}})
shots = 500000
