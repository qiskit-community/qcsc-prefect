# Required for both targets
hpc_target = "miyabi" # "miyabi" or "fugaku"
project = "gz00"
queue = "regular-c" # Miyabi queue, or Fugaku rscgrp (e.g. "small")
work_dir = "/work/gz00/<user>/sbd_jobs"
sbd_executable = "/work/gz00/<user>/qcsc-prefect/algorithms/sbd/native/diag"

# Optional execution profile
# launcher default: "mpiexec.hydra" (miyabi), "mpiexec" (fugaku)
launcher = "mpiexec.hydra"
walltime = "02:00:00"
num_nodes = 1
mpiprocs = 8
ompthreads = 1
modules = ["intel/2023.2.0", "impi/2021.10.0"]
mpi_options = ["-np", "8"]

# Optional Fugaku-specific settings (used only when hpc_target = "fugaku")
# fugaku_gfscache = "/vol0002"
# fugaku_spack_modules = ["fj", "fjmpi"]
# fugaku_mpi_options_for_pjm = ["max-proc-per-node=8"]

# Optional block/variable names
command_block_name = "cmd-sbd-diag"
execution_profile_block_name = "exec-sbd-mpi"     # Miyabi default
# execution_profile_block_name = "exec-sbd-fugaku" # Fugaku suggested
hpc_profile_block_name = "hpc-miyabi-sbd"         # Miyabi default
# hpc_profile_block_name = "hpc-fugaku-sbd"        # Fugaku suggested
solver_block_name = "davidson-solver"
options_variable_name = "sqd_options"

# Optional solver script / metrics naming
# script_filename = "sbd_solver.pbs"  # Miyabi default
# script_filename = "sbd_solver.pjm"  # Fugaku suggested
# metrics_artifact_key = "miyabi-sbd-metrics"  # Miyabi default
# metrics_artifact_key = "fugaku-sbd-metrics"  # Fugaku suggested

# Optional solver parameters
task_comm_size = 1
adet_comm_size = 1
bdet_comm_size = 1
# Fast preset for low-accuracy runs
block = 4
iteration = 1
tolerance = 0.01
carryover_ratio = 0.1
solver_mode = "cpu"

# Optional runtime options variable
# default if omitted: {"params":{"shots":500000}} for miyabi, {"params":{"shots":50000}} for fugaku
shots = 50000 # Fugaku tutorial baseline; override for your workload
