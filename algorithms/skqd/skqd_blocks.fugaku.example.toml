hpc_target = "fugaku"
group = "your-group"
queue = "your-queue"
work_dir = "/vol0004/your-group/your-user/skqd-work"
dice_executable = "/vol0004/your-group/your-user/qcsc-prefect/packages/qcsc-prefect-dice/native/bin/Dice"

launcher = "mpiexec"
walltime = "01:00:00"
num_nodes = 1
mpiprocs = 2
mpi_options = ["-n", "2"]
pre_commands = []

fugaku_gfscache = "/vol0004:/vol0002"
# Load the same runtime packages that were used when building Dice if needed.
fugaku_spack_modules = []
fugaku_mpi_options_for_pjm = ["max-proc-per-node=1"]
fugaku_pjm_resources = ["freq=2000,eco_state=2"]

command_block_name = "cmd-skqd-dice-solver"
execution_profile_block_name = "exec-skqd-dice-fugaku"
hpc_profile_block_name = "hpc-fugaku-skqd-dice"
solver_block_name = "skqd-solver"
options_variable_name = "sampler_options"
script_filename = "dice_solver.pjm"
metrics_artifact_key = "fugaku-skqd-dice-metrics"

select_cutoff = 5e-4
davidson_tol = 1e-5
energy_tol = 1e-10
max_iter = 10
return_sci_state = false

shots = 100000
